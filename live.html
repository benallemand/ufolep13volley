<!DOCTYPE html>
<html data-theme="cupcake" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Score</title>
    <link rel="stylesheet" href="./src/css/app.css">
</head>
<body>
<div id="app" class="min-h-screen bg-base-200">
    <!-- Header -->
    <div class="navbar bg-primary text-primary-content">
        <div class="flex-1">
            <a href="/pages/home.html" class="btn btn-ghost text-xl">
                <i class="fas fa-volleyball"></i> UFOLEP 13
            </a>
        </div>
        <div class="flex-none">
            <span class="badge badge-secondary" v-if="isLive">
                <i class="fas fa-circle text-red-500 animate-pulse mr-1"></i> LIVE
            </span>
        </div>
    </div>

    <!-- Match Info -->
    <div class="container mx-auto p-4 max-w-2xl">
        <div class="alert alert-error mb-4" v-if="error">
            <i class="fas fa-exclamation-triangle"></i>
            <span>Erreur: {{ error }}</span>
        </div>

        <template v-if="match">
            <!-- Competition Badge -->
            <div class="text-center mb-4">
                <span class="badge badge-info badge-lg">{{ match.libelle_competition }}</span>
                <span class="badge badge-outline ml-2">Division {{ match.division }}</span>
            </div>

            <!-- Score final (match terminé) : affiché dès que is_match_score_filled
                 vaut 1. C'est le score FINAL (sets gagnés), pas le live score. -->
            <div class="card bg-base-100 shadow-md border border-base-300 mb-4" v-if="isMatchFinished">
                <div class="card-body p-4">
                    <div class="text-center text-sm font-semibold opacity-60 mb-2">
                        <i class="fas fa-flag-checkered mr-1"></i>Résultat final
                    </div>
                    <div class="flex items-center justify-center gap-4 text-center">
                        <span class="flex-1 text-right font-bold">{{ match.equipe_dom }}</span>
                        <span class="text-3xl font-mono font-bold">{{ match.score_equipe_dom }} - {{ match.score_equipe_ext }}</span>
                        <span class="flex-1 text-left font-bold">{{ match.equipe_ext }}</span>
                    </div>
                </div>
            </div>

            <!-- Passer en mode scoreur — visible publiquement pour faire découvrir
                 la fonctionnalité. L'accès réel reste réservé aux responsables des 2
                 équipes et aux admins : c'est goToScorerMode() qui aiguille au clic.
                 Masqué quand le match est terminé (score final renseigné). -->
            <div class="text-center mb-4" v-if="!isScorer && !isMatchFinished">
                <button @click="goToScorerMode" type="button"
                        class="btn btn-warning btn-sm animate-pulse">
                    <i class="fas fa-edit mr-1"></i>Passer en mode scoreur
                </button>
            </div>

            <!-- Score Board (live) — masqué pour un match terminé en simple
                 consultation : le bloc "Résultat final" ci-dessus le remplace.
                 Reste visible en mode scoreur ou pendant un live en cours. -->
            <score-board
                v-if="isScorer || isLive || !isMatchFinished"
                :score="score"
                :left-team-name="leftTeamName"
                :right-team-name="rightTeamName"
                :left-team-label="leftTeamLabel"
                :right-team-label="rightTeamLabel"
                :left-team-key="leftTeamKey"
                :right-team-key="rightTeamKey"
                :is-scorer="canScore && isScorer && isLive"
                @increment-left="incrementLeft"
                @increment-right="incrementRight"
                @decrement-left="decrementLeft"
                @decrement-right="decrementRight">
            </score-board>

            <!-- Scorer Controls (only for authorized users in scorer mode) -->
            <template v-if="canScore && isScorer">
                <scorer-controls
                    :score="score"
                    :is-live="isLive"
                    :is-rotation-mode-enabled="isRotationModeEnabled"
                    :save-status="saveStatus"
                    :is-online="isOnline"
                    :left-team-name="leftTeamName"
                    :right-team-name="rightTeamName"
                    :left-team-key="leftTeamKey"
                    :right-team-key="rightTeamKey"
                    :left-lineup="lineups[leftTeamKey]"
                    :right-lineup="lineups[rightTeamKey]"
                    :left-team-players="leftTeamPlayers"
                    :right-team-players="rightTeamPlayers"
                    :left-timeouts="leftTimeouts"
                    :right-timeouts="rightTimeouts"
                    @increment-left="incrementLeft"
                    @increment-right="incrementRight"
                    @decrement-left="decrementLeft"
                    @decrement-right="decrementRight"
                    @next-set-left="nextSetLeft"
                    @next-set-right="nextSetRight"
                    @update-position="updatePosition"
                    @reset-positions="resetPositions"
                    @save-score="saveScore"
                    @save-to-match="saveToMatch"
                    @end-live="endLiveScore"
                    @start-timeout="startTimeout"
                    @swap-sides="toggleSwapSides">
                </scorer-controls>

                <!-- Start Live Button -->
                <div class="text-center mb-4" v-if="!isLive">
                    <button @click="startLiveScore()" class="btn btn-success btn-lg">
                        <i class="fas fa-play mr-2"></i> Démarrer le Live Score
                    </button>
                </div>
            </template>

            <!-- Status Messages -->
            <div class="alert alert-info mb-4" v-if="!isLive && !isScorer && !isMatchFinished">
                <i class="fas fa-info-circle"></i>
                <span>Le live score n'est pas encore démarré pour ce match.</span>
            </div>

            <!-- Auto-refresh indicator -->
            <div class="text-center text-sm text-gray-500" v-if="isLive && !isScorer">
                <i class="fas fa-sync-alt animate-spin mr-1"></i>
                Mise à jour automatique toutes les 5 secondes
            </div>

            <!-- Match Details -->
            <match-details :match="match"></match-details>
        </template>

        <!-- No match selected - show active live scores -->
        <active-match-list v-else :active-live-scores="activeLiveScores"></active-match-list>
    </div>
</div>
<script src="./live.js" type="module"></script>
</body>
</html>
